# EasyPanel / Nixpacks — Next.js (ehkini)
# https://nixpacks.com/docs/configuration/file

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
HOSTNAME = "0.0.0.0"
PORT = "3000"

[phases.install]
# Use npm install (not ci) so lock file minor drift does not fail the build
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
